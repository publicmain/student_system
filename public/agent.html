<style>
/* ═══════════════════════════════════════════════
   DESIGN TOKENS — Harvard Red Theme
   ═══════════════════════════════════════════════ */
:root{
  --crimson:#A51C30; --crimson-d:#8C1A28; --crimson-l:#C44056;
  --gold:#C4956A; --gold-l:#E8D5B7;
  --bg:#F7F5F2; --card:#FFFFFF; --bdr:#E5E0DA;
  --txt:#2D2926; --txt2:#5C5651; --txt3:#8A8380;
  --ok:#1B7F4B; --ok-bg:#E8F5ED; --err:#C41E3A; --err-bg:#FDF0F2;
  --info-bg:#FFF8F0; --pri-bg:#FDF5F3;
  --radius:10px; --shadow:0 2px 12px rgba(45,41,38,.06);
}
*{box-sizing:border-box}
body{margin:0;font-family:'Inter',system-ui,-apple-system,sans-serif;color:var(--txt);background:var(--bg);-webkit-font-smoothing:antialiased}

/* ═══ WELCOME PAGE ═══ */
.welcome{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:linear-gradient(170deg,#FDF5F3 0%,#F7F5F2 40%,#EDEBE8 100%);padding:24px;text-align:center}
.welcome-card{max-width:520px;width:100%;background:var(--card);border-radius:16px;padding:48px 40px;box-shadow:var(--shadow)}
.welcome .logo{width:110px;height:auto;margin-bottom:24px}
.welcome h1{font-size:1.5rem;font-weight:700;color:var(--crimson);margin:0 0 8px}
.welcome .subtitle{font-size:.95rem;color:var(--txt2);margin-bottom:28px;line-height:1.6}
.welcome .checklist{text-align:left;margin:0 auto 28px;max-width:380px}
.welcome .checklist li{font-size:.85rem;color:var(--txt2);padding:5px 0;list-style:none;display:flex;align-items:flex-start;gap:8px}
.welcome .checklist li i{color:var(--crimson);flex-shrink:0;margin-top:2px}
.btn-start{background:var(--crimson);color:#fff;border:none;padding:14px 48px;border-radius:var(--radius);
  font-size:1rem;font-weight:600;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:8px}
.btn-start:hover{background:var(--crimson-d);color:#fff;transform:translateY(-1px);box-shadow:0 4px 16px rgba(165,28,48,.25)}
.lang-toggle{position:absolute;top:20px;right:24px;display:flex;gap:2px;background:var(--card);border-radius:6px;
  padding:2px;box-shadow:0 1px 4px rgba(0,0,0,.08);z-index:50}
.lang-btn{border:none;background:transparent;padding:6px 14px;font-size:.78rem;font-weight:600;cursor:pointer;
  border-radius:4px;color:var(--txt3);transition:all .15s}
.lang-btn.active{background:var(--crimson);color:#fff}

/* ═══ APP SHELL ═══ */
.app-header{background:var(--card);border-bottom:1px solid var(--bdr);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40}
.app-header .logo{height:36px;width:auto}
.app-header .header-right{display:flex;align-items:center;gap:16px}
.app-header .meta{font-size:.78rem;color:var(--txt3);text-align:right}
.app-wrap{display:flex;max-width:1120px;margin:0 auto;padding:24px 16px;gap:24px;min-height:calc(100vh - 61px)}
.side-nav{width:230px;flex-shrink:0;position:sticky;top:85px;align-self:flex-start}
.main-panel{flex:1;min-width:0}

/* ═══ STEP NAV ═══ */
.nav-progress{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--shadow)}
.nav-progress .progress{height:5px;border-radius:4px;background:var(--bdr)}
.nav-progress .progress-bar{background:var(--crimson);border-radius:4px;transition:width .4s}
.step-list{list-style:none;padding:0;margin:0}
.step-item{display:flex;align-items:center;gap:10px;padding:9px 14px;border-radius:8px;cursor:pointer;
  margin-bottom:2px;font-size:.82rem;color:var(--txt3);transition:all .15s;user-select:none}
.step-item:hover{background:var(--pri-bg);color:var(--crimson)}
.step-item.active{background:var(--pri-bg);color:var(--crimson);font-weight:600}
.step-item.done{color:var(--ok)}
.step-num{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;border:2px solid var(--bdr);background:#fff;flex-shrink:0;transition:all .15s}
.step-item.active .step-num{border-color:var(--crimson);background:var(--crimson);color:#fff}
.step-item.done .step-num{border-color:var(--ok);background:var(--ok);color:#fff}

/* ═══ FORM CARD ═══ */
.form-card{background:var(--card);border-radius:12px;box-shadow:var(--shadow);padding:32px}
.sec-title{font-size:1.15rem;font-weight:700;color:var(--crimson);margin-bottom:4px;display:flex;align-items:center;gap:8px}
.sec-desc{font-size:.82rem;color:var(--txt3);margin-bottom:24px;line-height:1.5}
.sec-divider{border:none;border-top:1px solid var(--bdr);margin:28px 0}
.sub-heading{font-size:.9rem;font-weight:600;color:var(--crimson);margin:16px 0 12px;display:flex;align-items:center;gap:6px}

/* ═══ FIELDS ═══ */
.fl{margin-bottom:16px}
.fl-label{font-size:.78rem;font-weight:600;color:var(--txt);margin-bottom:4px}
.fl-label .req{color:var(--err);margin-left:2px}
.fl-hint{font-size:.7rem;color:var(--txt3);margin-top:3px}
.form-control,.form-select{font-size:.85rem;border-radius:8px;border:1px solid var(--bdr);padding:9px 12px;
  background:#fff;transition:border-color .15s,box-shadow .15s}
.form-control:focus,.form-select:focus{border-color:var(--crimson-l);box-shadow:0 0 0 3px rgba(165,28,48,.1);outline:none}
.form-control.is-invalid{border-color:var(--err)}
.bool-row{display:flex;gap:20px;padding:6px 0}
.bool-row label{display:flex;align-items:center;gap:6px;font-size:.85rem;cursor:pointer}
.bool-row input[type="radio"]{accent-color:var(--crimson);width:16px;height:16px}

/* ═══ DYNAMIC ROWS ═══ */
.dyn-row{border:1px solid var(--bdr);border-radius:var(--radius);padding:16px 16px 8px;margin-bottom:10px;background:var(--bg);position:relative}
.dyn-row .rm-btn{position:absolute;top:8px;right:10px;background:none;border:none;color:var(--err);cursor:pointer;opacity:.5;font-size:1.1rem}
.dyn-row .rm-btn:hover{opacity:1}
.dyn-row .row-tag{font-size:.72rem;font-weight:700;color:var(--crimson);text-transform:uppercase;margin-bottom:8px}
.add-btn{border:2px dashed var(--bdr);border-radius:var(--radius);padding:12px;text-align:center;cursor:pointer;
  color:var(--crimson);font-size:.85rem;font-weight:600;transition:all .15s;background:none;width:100%}
.add-btn:hover{border-color:var(--crimson-l);background:var(--pri-bg)}

/* ═══ UPLOAD ═══ */
.upload-zone{border:2px dashed var(--bdr);border-radius:var(--radius);padding:20px;text-align:center;cursor:pointer;
  transition:all .15s;background:var(--bg)}
.upload-zone:hover{border-color:var(--crimson-l);background:var(--pri-bg)}
.upload-zone.dragging{border-color:var(--crimson);background:rgba(165,28,48,.06)}
.upload-zone i.icon{font-size:1.6rem;color:var(--crimson-l)}
.mat-card{border:1px solid var(--bdr);border-radius:var(--radius);padding:14px 16px;margin-bottom:8px;transition:all .15s}
.mat-card.s-ok{border-color:var(--ok);background:var(--ok-bg)}
.mat-card.s-up{border-color:var(--crimson-l);background:var(--pri-bg)}
.mat-card.s-err{border-color:var(--err);background:var(--err-bg)}
.pill{display:inline-flex;align-items:center;gap:4px;padding:2px 10px;border-radius:999px;font-size:.7rem;font-weight:600}
.pill-ok{background:var(--ok-bg);color:var(--ok)} .pill-wait{background:#f1f5f9;color:var(--txt3)}
.pill-up{background:var(--pri-bg);color:var(--crimson)} .pill-err{background:var(--err-bg);color:var(--err)}

/* ═══ SIGNATURE ═══ */
.sig-box{border:2px solid var(--bdr);border-radius:8px;cursor:crosshair;touch-action:none;background:#fff;width:100%;max-width:500px}
.sig-box:hover{border-color:var(--crimson-l)}
@media(max-width:768px){.sig-box{height:150px}}

/* ═══ CONDITIONAL ═══ */
.cond-block{border-left:3px solid var(--crimson-l);background:var(--pri-bg);border-radius:0 8px 8px 0;padding:16px 20px;margin:16px 0}
.cond-label{font-size:.8rem;color:var(--crimson);font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:6px}

/* ═══ REVIEW ═══ */
.rv-group{margin-bottom:20px}
.rv-group h6{font-size:.85rem;font-weight:700;color:var(--crimson);border-bottom:1px solid var(--bdr);padding-bottom:6px;margin-bottom:8px}
.rv-r{display:flex;padding:3px 0;font-size:.82rem}
.rv-r .k{width:170px;color:var(--txt3);flex-shrink:0}
.rv-r .v{flex:1;font-weight:500}
.rv-r .v.empty{color:var(--err);font-style:italic;font-weight:400}

/* ═══ NAV BUTTONS ═══ */
.btn-nav{padding:10px 28px;border-radius:8px;font-weight:600;font-size:.9rem;transition:all .15s}
.btn-next{background:var(--crimson);color:#fff;border:none}
.btn-next:hover{background:var(--crimson-d);color:#fff}
.btn-prev{background:#fff;color:var(--txt);border:1px solid var(--bdr)}
.btn-prev:hover{background:var(--bg)}
.btn-submit{background:var(--ok);color:#fff;border:none;padding:12px 40px;font-size:.95rem}
.btn-submit:hover{background:#157a43;color:#fff}

/* ═══ SAVE INDICATOR ═══ */
.save-ind{position:fixed;bottom:16px;right:16px;font-size:.76rem;color:var(--ok);background:var(--card);
  padding:6px 14px;border-radius:999px;box-shadow:0 2px 10px rgba(0,0,0,.1);z-index:99;transition:opacity .3s}

/* ═══ ERROR PAGE ═══ */
.err-page{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}

/* ═══ RESPONSIVE ═══ */
@media(max-width:768px){
  .welcome-card{padding:32px 24px}
  .welcome .logo{width:80px}
  .welcome h1{font-size:1.2rem}
  .lang-toggle{top:12px;right:12px}
  .app-header{padding:10px 14px}
  .app-header .logo{height:28px}
  .app-header .meta{display:none}
  .app-wrap{flex-direction:column;padding:12px 10px;gap:12px}
  .side-nav{width:100%;position:static;order:-1}
  .step-list{display:flex;overflow-x:auto;gap:2px;padding-bottom:4px;-webkit-overflow-scrolling:touch}
  .step-item{white-space:nowrap;padding:6px 10px;font-size:.75rem;flex-shrink:0}
  .step-num{width:20px;height:20px;font-size:9px}
  .form-card{padding:20px 16px;border-radius:10px}
  .sec-title{font-size:1rem}
  .nav-progress{padding:12px}
  .btn-nav{padding:10px 20px;font-size:.85rem}
  .dyn-row{padding:12px 12px 6px}
  .step-nav-btns{padding:8px 0}
}
@media(max-width:768px){.step-nav-btns .btn-nav{flex:1}}
</style>
</head>

function esc(s){return s==null?'':String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function toast(msg,type='success'){const el=document.createElement('div');el.className=`alert alert-${type} py-2 px-3 shadow-sm mb-2`;el.style.cssText='font-size:.85rem;min-width:260px';el.textContent=msg;document.getElementById('toastWrap').appendChild(el);setTimeout(()=>{el.style.opacity='0';setTimeout(()=>el.remove(),300)},3500)}
async function api(method,path,body){const sep=path.includes('?')?'&':'?';const url=`/api${path}${sep}token=${encodeURIComponent(S.token)}`;const opts={method,headers:{}};if(body&&!(body instanceof FormData)){opts.headers['Content-Type']='application/json';opts.body=JSON.stringify(body)}else if(body){opts.body=body}const res=await fetch(url,opts);const data=await res.json().catch(()=>({}));if(!res.ok)throw new Error(data.error||'Request failed');return data}
function calcAge(d){if(!d)return null;const b=new Date(d);if(isNaN(b))return null;const n=new Date();let a=n.getFullYear()-b.getFullYear();if(n.getMonth()<b.getMonth()||(n.getMonth()===b.getMonth()&&n.getDate()<b.getDate()))a--;return a}

function F(key,labelKey,type='text',opts={}){
  const val=S.data[key]||'';const dis=S.uifStatus==='SUBMITTED'?'disabled':'';
  let inp='';
  if(type==='textarea')inp=`<textarea class="form-control" name="${key}" rows="${opts.rows||3}" placeholder="${esc(opts.ph||'')}" ${dis}>${esc(val)}</textarea>`;
  else if(type==='select'){
    const chg=opts.refresh?` onchange="collect();renderStep()"`:''
    inp=`<select class="form-select" name="${key}" ${dis}${chg}>${(opts.options||[]).map(([v,lk])=>`<option value="${v}" ${val===v?'selected':''}>${typeof lk==='function'?lk():t(lk)||lk}</option>`).join('')}</select>`;
  }
  else if(type==='bool'){
    const chg=opts.refresh?` onchange="collect();renderStep()"`:''
    inp=`<div class="bool-row"><label><input type="radio" name="${key}" value="1" ${val==='1'||val===true||val===1?'checked':''} ${dis}${chg}> ${t('yes')}</label><label><input type="radio" name="${key}" value="0" ${val==='0'||val===false||val===0?'checked':''} ${dis}${chg}> ${t('no')}</label></div>`;
  }
  else inp=`<input type="${type}" class="form-control" name="${key}" value="${esc(val)}" placeholder="${esc(opts.ph||'')}" ${dis}>`;
  return `<div class="fl"><div class="fl-label">${t(labelKey)||labelKey}${opts.req?'<span class="req">*</span>':''}</div>${inp}${opts.hint?`<div class="fl-hint">${opts.hint}</div>`:''}</div>`;
}
function R2(a,b){return `<div class="row g-3"><div class="col-md-6">${a}</div><div class="col-md-6">${b}</div></div>`}
function R3(a,b,c){return `<div class="row g-3"><div class="col-md-4">${a}</div><div class="col-md-4">${b}</div><div class="col-md-4">${c}</div></div>`}

// SIGNATURE CANVAS
// ══════════════════════════════════════════════════
function initSig(id){
  const c=document.getElementById(id);if(!c)return;
  // 动态设置 canvas 分辨率匹配显示尺寸（避免模糊 + 支持移动端自适应）
  const rect=c.getBoundingClientRect();
  const dpr=window.devicePixelRatio||1;
  c.width=rect.width*dpr;
  c.height=rect.height*dpr;
  const ctx=c.getContext('2d');
  ctx.scale(dpr,dpr);
  ctx.strokeStyle='#2D2926';ctx.lineWidth=2;ctx.lineCap='round';
  let drawing=false;
  const pos=e=>{const r=c.getBoundingClientRect();const p=e.touches?e.touches[0]:e;return{x:(p.clientX-r.left),y:(p.clientY-r.top)}};
  const start=e=>{e.preventDefault();drawing=true;const p=pos(e);ctx.beginPath();ctx.moveTo(p.x,p.y)};
  const move=e=>{if(!drawing)return;e.preventDefault();const p=pos(e);ctx.lineTo(p.x,p.y);ctx.stroke()};
  const end=()=>{
    if(!drawing)return;
    drawing=false;S.dirty=true;
    // 立即保存签名数据到 S.signatures（不等 collect）
    try{
      const dataUrl=c.toDataURL('image/png');
      if(id==='sigCanvas'){
        S.signatures.applicant={sig_data:dataUrl,sig_date:S.data.sig_date||new Date().toISOString().slice(0,10),signer_name:(S.data.surname||'')+' '+(S.data.given_name||'')};
      } else if(id==='sigGuardian'){
        S.signatures.guardian={sig_data:dataUrl,sig_date:S.data.sig_date||'',signer_name:(S.data.guardian_surname||'')+' '+(S.data.guardian_given_name||'')};
      }
    }catch(e){console.warn('Sig save on end:',e)}
  };
  c.addEventListener('mousedown',start);c.addEventListener('mousemove',move);c.addEventListener('mouseup',end);c.addEventListener('mouseleave',end);
  c.addEventListener('touchstart',start,{passive:false});c.addEventListener('touchmove',move,{passive:false});c.addEventListener('touchend',end);
}
function clearSig(id){
  const c=document.getElementById(id);
  if(c)c.getContext('2d').clearRect(0,0,c.width,c.height);
  if(id==='sigCanvas') delete S.signatures.applicant;
  if(id==='sigGuardian') delete S.signatures.guardian;
}

// ── Photo Upload ──
function handlePhotoUpload(file){
  if(!file)return;
  if(file.size>5*1024*1024){toast('Photo must be under 5MB','danger');return}
  if(!file.type.startsWith('image/')){toast('Please select an image file','danger');return}
  const reader=new FileReader();
  reader.onload=function(e){
    S.data._id_photo_data=e.target.result;
    const preview=document.getElementById('photoPreview');
    if(preview)preview.innerHTML=`<img src="${e.target.result}" style="max-width:120px;max-height:150px;border-radius:6px;border:1px solid var(--bdr)">`;
    S.dirty=true;scheduleSave();
  };
  reader.readAsDataURL(file);
}

function trigUp(id){document.getElementById(`fi-${id}`)?.click()}
function hdDrop(e,id){e.preventDefault();e.currentTarget.classList.remove('dragging');const f=e.dataTransfer?.files?.[0];if(f)upFile(id,f)}
async function upFile(id,file){if(!file)return;if(file.size>10*1024*1024){toast('File > 10MB','danger');return}

// DATA COLLECTION & SAVE
// ══════════════════════════════════════════════════
function collect(){
  try{
    document.querySelectorAll('input[name],select[name],textarea[name]').forEach(el=>{
      if(!el.name)return;
      const v=String(el.value||'');
      if(el.type==='radio'){if(el.checked)S.data[el.name]=v}
      else{if(v.trim())S.data[el.name]=v.trim();else delete S.data[el.name]}
    });
    document.querySelectorAll('[data-arr][data-idx][data-key]').forEach(el=>{
      const a=el.dataset.arr,i=parseInt(el.dataset.idx),k=el.dataset.key,v=String(el.value||'');
      if(S[a]&&i>=0&&i<S[a].length){if(v.trim())S[a][i][k]=v.trim();else delete S[a][i][k]}
    });
    // 签名数据已在 canvas mouseup/touchend 时即时保存到 S.signatures
    // 此处不再扫描 canvas — 避免跨步骤时 canvas 不存在或空白导致数据丢失
  }catch(e){console.error('collect() error:',e)}
}
let _st=null;
function scheduleSave(){clearTimeout(_st);_st=setTimeout(saveDraft,8000)}
async function saveDraft(){
  // 已提交/已通过状态下不保存草稿（但不阻断页面）
  const noSave = ['SUBMITTED','APPROVED','MERGED'];
  if(S.uifStatus && noSave.includes(S.uifStatus)) return;
  if(S.request?.status && noSave.includes(S.request.status)) return;
  collect();
  // 保护签名和证件照：只在有值时才发送，避免空覆盖
  const payload = {...S.data,_family:S.family,_residence:S.residence,_education:S.education,_employment:S.employment,_guardian:S.guardian,_step:S.step};
  if(S.signatures && Object.keys(S.signatures).length) payload._signatures = S.signatures;
  if(S.data._id_photo_data) payload._id_photo_data = S.data._id_photo_data;
  try{await api('PUT','/agent/uif',{data:payload});
    let ind=document.getElementById('svInd');if(!ind){ind=document.createElement('div');ind.id='svInd';ind.className='save-ind';document.body.appendChild(ind)}
    ind.textContent=t('draft_saved');ind.style.opacity='1';setTimeout(()=>ind.style.opacity='0',2500)}catch(e){}}

// ══════════════════════════════════════════════════
function goStep(i){
  try{
    collect();
    S.step=Math.max(0,Math.min(STEPS-1,i));
    renderApp();
    saveDraft();
    window.scrollTo({top:0,behavior:'smooth'});
  }catch(e){console.error('goStep error:',e);alert('Navigation error: '+e.message)}
}
function renderStep(){const el=document.getElementById('stepContent');if(el){el.innerHTML=renderStepContent(S.step);attachInputs()}}
function attachInputs(){
  document.querySelectorAll('#stepContent input,#stepContent select,#stepContent textarea').forEach(el=>el.addEventListener('input',()=>{S.dirty=true;scheduleSave()}));
  if(S.step===9){setTimeout(()=>{initSig('sigCanvas');initSig('sigGuardian')},80)}
  // 显示字段级打回备注
  if(S.fieldNotes && typeof S.fieldNotes === 'object'){
    document.querySelectorAll('#stepContent [name]').forEach(el=>{
      const key = el.getAttribute('name') || el.getAttribute('data-key');
      if(key && S.fieldNotes[key]){
        el.style.borderColor='#dc2626';
        el.style.boxShadow='0 0 0 2px rgba(220,38,38,.15)';
        const note=document.createElement('div');
        note.className='field-note';
        note.style.cssText='color:#dc2626;font-size:.8rem;margin-top:2px;display:flex;align-items:center;gap:4px';
        note.innerHTML='<i class="bi bi-exclamation-circle"></i>'+S.fieldNotes[key].replace(/</g,'&lt;');
        el.parentElement.appendChild(note);
      }
    });
  }
  // 已提交状态下禁用表单输入（但保留文件上传框可用）
  if(!S.editable){
    document.querySelectorAll('#stepContent input,#stepContent select,#stepContent textarea').forEach(el=>{
      if(el.type==='file') return; // 文件上传框不禁用，允许补传材料
      el.disabled=true;
    });
  }
}

// SUBMIT
// ══════════════════════════════════════════════════
async function submitAll(){
  if(S._submitting){toast(lang==='zh'?'正在提交中，请稍候...':'Submitting, please wait...','warning');return}
  collect();
  // 已提交状态下不允许重复提交
  if(S.request?.status === 'SUBMITTED') {
    toast(lang==='zh'?'表单已提交，请等待审核':'Already submitted, please wait for review','warning');return;
  }
  const req=['surname','given_name','dob','nationality','email','phone_mobile','passport_no','passport_expiry','country_of_residence'];
  // Add guardian validation for minors
  const age=calcAge(S.data.dob);
  if(age!==null&&age<18){req.push('guardian_surname','guardian_given_name','guardian_relation','guardian_phone')}
  const miss=req.filter(k=>!S.data[k]);if(miss.length){toast(t('fill_required')+miss.join(', '),'warning');return}
  // Warn if no family members
  if(S.family.length===0){if(!confirm(lang==='zh'?'未添加家庭成员信息，确认继续？':'No family members added. Continue anyway?'))return}
  // Warn if no signature
  if(!S.signatures.applicant || !S.signatures.applicant.sig_data){
    if(!confirm(lang==='zh'?'尚未签名（请在"同意与签名"步骤用鼠标签名）。确认不签名直接提交？':'No signature detected. Submit without signature?'))return;
  }
  // Check required materials uploaded
  const missingFiles = (S.materials||[]).filter(m => m.is_required && m.status === 'PENDING');
  if(missingFiles.length){
    const names = missingFiles.map(m => m.name).join('、');
    toast(lang==='zh' ? `以下必须材料尚未上传：${names}` : `Required files not uploaded: ${names}`, 'warning');
    return;
  }
  if(!confirm(t('submit_confirm')))return;
  // 锁定提交（放在 confirm 之后，所有 early return 之后）
  S._submitting=true;
  // 显示加载动画
  const submitBtn=document.querySelector('.btn-submit');
  const btnOriginal=submitBtn?submitBtn.innerHTML:'';
  if(submitBtn){submitBtn.disabled=true;submitBtn.innerHTML=`<span class="spinner-border spinner-border-sm me-2"></span>${lang==='zh'?'正在提交...':'Submitting...'}`}
  await saveDraft();
  try{await api('POST','/agent/uif/submit',{data:{...S.data,_family:S.family,_residence:S.residence,_education:S.education,_employment:S.employment,_guardian:S.guardian,_signatures:S.signatures}});
    toast(t('submit_success'));S.uifStatus='SUBMITTED';if(S.request)S.request.status='SUBMITTED';renderApp()
  }catch(e){
    // 如果后端说"已提交"，说明之前提交其实成功了——同样切到已提交状态
    if(e.message&&(e.message.includes('已提交')||e.message.includes('Already submitted'))){
      toast(t('submit_success'));S.uifStatus='SUBMITTED';if(S.request)S.request.status='SUBMITTED';renderApp()
    }else{
      toast(e.message,'danger');if(submitBtn){submitBtn.disabled=false;submitBtn.innerHTML=btnOriginal}
    }
  }finally{S._submitting=false}}

          <div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:8px">

              <div style="color:#7f1d1d;font-size:.9rem">${S.request.return_reason ? S.request.return_reason.replace(/</g,'&lt;') : ''}</div>
            </div>
          </div>
          ${fieldIssues.length ? `<div style="background:#fff;border:1px solid #fca5a5;border-radius:8px;padding:10px 14px;margin:8px 0">
            <div style="font-weight:600;color:#dc2626;font-size:.85rem;margin-bottom:6px"><i class="bi bi-input-cursor-text me-1"></i>${lang==='zh'?'表单字段问题':'Form Field Issues'}</div>
            ${fieldIssues.map(([k,v])=>'<div style="font-size:.83rem;color:#991b1b;padding:2px 0"><code style="background:#fde8e8;padding:1px 4px;border-radius:3px">'+k+'</code> '+v.replace(/</g,'&lt;')+'</div>').join('')}
          </div>` : ''}
          ${fileIssues.length ? `<div style="background:#fff;border:1px solid #fde68a;border-radius:8px;padding:10px 14px;margin:8px 0">
            <div style="font-weight:600;color:#d97706;font-size:.85rem;margin-bottom:6px"><i class="bi bi-file-earmark-x me-1"></i>${lang==='zh'?'文件问题':'File Issues'}</div>
            ${fileIssues.map(([k,v])=>'<div style="font-size:.83rem;color:#92400e;padding:2px 0"><b>'+k+'</b>: '+v.replace(/</g,'&lt;')+'</div>').join('')}
          </div>` : ''}
          ${consistency ? `<div style="background:#fff;border:1px solid #fca5a5;border-radius:8px;padding:10px 14px;margin:8px 0">
            <div style="font-weight:600;color:#dc2626;font-size:.85rem;margin-bottom:4px"><i class="bi bi-exclamation-diamond me-1"></i>${lang==='zh'?'一致性问题':'Consistency Issues'}</div>
            <div style="font-size:.83rem;color:#991b1b">${consistency.replace(/</g,'&lt;').replace(/\n/g,'<br>')}</div>
          </div>` : ''}
          <div style="color:#991b1b;font-size:.85rem;margin-top:8px;font-weight:500">${lang==='zh'?'请根据以上意见修改后重新提交。':'Please revise based on the feedback above and resubmit.'}</div>
        </div>`;
        })() : ''}
        ${S.uifStatus==='SUBMITTED' && S.request?.status==='SUBMITTED' ? `
        <div style="background:#f0fdf4;border:1.5px solid #86efac;border-radius:10px;padding:14px 18px;margin-bottom:16px;text-align:center">
          <i class="bi bi-check-circle-fill" style="color:#16a34a;font-size:1.5rem"></i>

        </div>` : ''}
        <div class="form-card" id="stepContent">${renderStepContent(S.step)}</div>
        <div class="d-flex justify-content-between mt-3 step-nav-btns">
          ${S.step>0?`<button class="btn btn-nav btn-prev" onclick="goStep(${S.step-1})"><i class="bi bi-arrow-left me-1"></i>${t('prev')}</button>`:'<div></div>'}
          ${S.step<STEPS-1?`<button class="btn btn-nav btn-next" onclick="goStep(${S.step+1})">${t('next')} <i class="bi bi-arrow-right ms-1"></i></button>`:'<div></div>'}
        </div>
      </div>
    </div>`;
  attachInputs();
  }catch(e){console.error('renderApp error:',e);document.getElementById('app').innerHTML='<div class="p-4"><h5 class="text-danger">Render Error</h5><pre>'+e.message+'\\n'+e.stack+'</pre></div>'}
}

async function loadWorkspace(){
  try{const ws=await api('GET','/agent/workspace');S.request=ws;S.materials=ws.items||[];S.uifStatus=ws.uif?.status;
    // 加载打回信息
    S.fieldNotes = ws.field_notes || null;  // {field_key: "note text", ...}
    S.versions = ws.versions || [];
    S.editable = ws.editable !== false;
    try{const uif=await api('GET','/agent/uif');const raw=uif.data||'{}';const p=JSON.parse(raw);
      if(S._isDemo && uif.status === 'DRAFT' && !p._signatures){
        // Demo 模式 + 全新草稿：使用 demo 预填数据，不覆盖
      } else {
        // 正常模式 或 已有服务器数据（包括打回后）：从服务器恢复
        S.family=p._family||S.family||[];
        S.residence=p._residence||S.residence||[];
        S.education=p._education||S.education||[];
        S.employment=p._employment||S.employment||[];
        S.guardian=p._guardian||S.guardian||{};
        // 签名和照片：服务器有就用服务器的，否则保留当前（demo 数据）
        if(p._signatures && Object.keys(p._signatures).length) S.signatures=p._signatures;
        S.step=p._step||S.step||0;
        delete p._family;delete p._residence;delete p._education;delete p._employment;delete p._guardian;delete p._signatures;delete p._step;
        // 合并数据：服务器字段覆盖 demo 字段，保留 demo 中有但服务器没有的
        S.data = {...S.data, ...p};
        // 证件照：服务器有就用服务器的
        if(p._id_photo_data) S.data._id_photo_data = p._id_photo_data;
      }
    }catch(e){if(!S._isDemo)S.data={}}
    renderApp()}catch(e){showError(e.message)}}

async function init(){
  const params=new URLSearchParams(window.location.search);S.token=params.get('token');
  if(!S.token){showError('Missing access token. Please use the link from your email.');return}
  // 未保存离开提醒
  window.addEventListener('beforeunload',e=>{if(S.dirty&&S.page==='form'&&S.editable){e.preventDefault();e.returnValue=''}});
  // Demo mode: &demo=1 预填测试数据
  if(params.get('demo')==='1') loadDemoData();
  try{const auth=await api('GET','/agent/auth');S.request=auth.request;S.contact=auth.contact;
    document.getElementById('app').dataset.ready='1';
    renderWelcome()}catch(e){showError(e.message)}}

function showError(msg){
  document.getElementById('app').innerHTML=`<div class="err-page"><div>
    <i class="bi bi-shield-lock" style="font-size:3.5rem;color:var(--crimson)"></i>
    <h5 class="mt-3" style="color:var(--crimson)">Access Denied</h5>
    <p style="color:var(--txt2)">${esc(msg)}</p></div></div>`}

init();
</script>
